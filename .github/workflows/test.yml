name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint (clippy, ruff, thaw-lint)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 so the changed-files ruff step can diff against the
      # PR base (or the previous commit on a push).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install ruff
        run: pip install ruff

      # ruff runs on CHANGED Python only. The legacy tree has known debt
      # (tracked in the ratchet plan in CONTRIBUTING.md); gating the whole
      # tree on it would block every PR. Scoping to the diff means new and
      # touched code must be clean without forcing a one-shot tree cleanup
      # that would collide with in-flight PRs. --select F,E9 = real bugs
      # (undefined names, unused imports, syntax), not style.
      - name: ruff (real-bug rules) on changed Python
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then BASE="${{ github.event.before }}"; fi
          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            BASE="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [ -n "$BASE" ]; then
            FILES="$(git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- '*.py' || true)"
          else
            FILES="$(git ls-files '*.py')"
          fi
          if [ -z "$FILES" ]; then
            echo "No changed Python files — skipping ruff."
            exit 0
          fi
          echo "Linting changed Python files:"
          echo "$FILES"
          echo "$FILES" | xargs ruff check --select F,E9

      # thaw-lint runs on the WHOLE tree: every rule is a regression guard on
      # something currently clean (or a non-blocking WARN), so it stays green.
      - name: thaw-lint (project footguns)
        run: python tools/thaw_lint.py

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # clippy runs tree-wide with -D warnings: the workspace is clean today,
      # so this is a regression guard. thaw-py is excluded (it needs the
      # PyO3/CUDA surface that only builds in the wheel workflow).
      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --exclude thaw-py --all-targets -- -D warnings

  rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mac is the required matrix: the `default` feature set is
        # defined as Mac-compile-safe (no CUDA, no thaw-cuda-sys), and
        # tier-2 mock tests run against MockCuda. Ubuntu covers Linux
        # builds for the same surface. The `cuda` feature is exercised
        # by the wheel-build workflow, not here.
        os: [ubuntu-22.04, macos-14]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --exclude thaw-py --all-targets

      - name: cargo test
        run: cargo test --workspace --exclude thaw-py --all-targets

  python:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install test deps
        # torch, vllm and sglang are mocked in tests/conftest.py so we
        # deliberately do NOT install them here — keeping the CI image
        # small and avoiding a 2+ GB torch download per matrix entry.
        # fastapi is real (test_pool.py imports it at runtime) and moto
        # is real (test_cloud.py drives an in-process fake S3).
        # langchain-core and langgraph are real (ChatThaw subclasses
        # BaseChatModel, and demos/pr_review_langgraph.py imports langgraph
        # StateGraph at module level — neither can be meaningfully mocked).
        # pytest-asyncio is needed for the async coalescer tests.
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi 'moto>=5.0' boto3 \
            'langchain-core>=0.3' 'langgraph>=0.2' 'pytest-asyncio>=0.23'

      - name: Run pytest
        run: pytest tests/ -q
