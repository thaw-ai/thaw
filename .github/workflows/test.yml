name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mac is the required matrix: the `default` feature set is
        # defined as Mac-compile-safe (no CUDA, no thaw-cuda-sys), and
        # tier-2 mock tests run against MockCuda. Ubuntu covers Linux
        # builds for the same surface. The `cuda` feature is exercised
        # by the wheel-build workflow, not here.
        os: [ubuntu-22.04, macos-14]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --exclude thaw-py --all-targets

      - name: cargo test
        run: cargo test --workspace --exclude thaw-py --all-targets

  python:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install test deps
        # torch, vllm and sglang are mocked in tests/conftest.py so we
        # deliberately do NOT install them here — keeping the CI image
        # small and avoiding a 2+ GB torch download per matrix entry.
        # fastapi is real (test_pool.py imports it at runtime) and moto
        # is real (test_cloud.py drives an in-process fake S3).
        # langchain-core is real (ChatThaw subclasses BaseChatModel — can't
        # be meaningfully mocked) and pytest-asyncio is needed for the
        # async coalescer tests.
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi 'moto>=5.0' boto3 \
            'langchain-core>=0.3' 'pytest-asyncio>=0.23'

      - name: Run pytest
        run: pytest tests/ -q
